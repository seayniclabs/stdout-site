services:
  stdout-site:
    build: .
    container_name: stdout-site
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
      - /Volumes/data/secrets/stdout_admin_email:/run/secrets/stdout_admin_email:ro
      - /Volumes/data/secrets/stdout_admin_password:/run/secrets/stdout_admin_password:ro
      - /Volumes/data/secrets/stdout_session_secret:/run/secrets/stdout_session_secret:ro
    environment:
      - TZ=America/Chicago
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DB_PATH=/app/data/stdout-site.db
      - SEED_DIR=/app/community-seed
      - SITE_URL=https://stdout.seayniclabs.com
      - ADMIN_EMAIL_FILE=/run/secrets/stdout_admin_email
      - ADMIN_PASSWORD_FILE=/run/secrets/stdout_admin_password
      - SESSION_SECRET_FILE=/run/secrets/stdout_session_secret
    networks:
      - stdout-site-net

  nginx:
    image: nginx:alpine
    container_name: stdout-site-nginx
    restart: unless-stopped
    ports:
      - "8114:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      stdout-site:
        condition: service_healthy
    environment:
      - TZ=America/Chicago
    networks:
      - stdout-site-net

networks:
  stdout-site-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.22.0.0/24
